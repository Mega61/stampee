# Stampee stack — Portainer (standalone compose) deployment.
#
# Deploy: Portainer -> Stacks -> Add stack -> Web editor -> paste this file.
# Then set these under the stack's "Environment variables" section:
#   STAMPEE_DB_PASSWORD   (password of the loyalty_user role from QUICKSTART §2)
#   JWT_ACCESS_SECRET     (>=32 random chars)
#   JWT_REFRESH_SECRET    (>=32 random chars)
# Optional (leave unset until needed):
#   RESEND_API_KEY, GCS_BUCKET, GCS_PROJECT_ID
#   GOOGLE_CLIENT_ID (enables "Sign in with Google"; same value baked into the SPA),
#     GOOGLE_WORKSPACE_DOMAIN (default goldenbeautystudio.com.co)
#   STAMPEE_DB_USER (default loyalty_user), STAMPEE_DB_NAME (default stampee),
#   STAMPEE_DB_HOST (default postgres-transversal)
#
# Assumes the same external networks as the Strapi stack:
#   web  -> the Caddy reverse proxy network
#   data -> the shared Postgres network (host `postgres-transversal`)
# Stampee uses its OWN database on that Postgres (see QUICKSTART §2).
#
# Caddy routes to these by container name on the `web` network:
#   loyalty.goldenbeautystudio.com.co      -> reverse_proxy stampee-spa:80
#   api.loyalty.goldenbeautystudio.com.co  -> reverse_proxy stampee-api:3001
#
# Images are built + pushed by .github/workflows/build-api.yml / build-spa.yml.
# Portainer must be able to pull from GHCR (make the packages public, or add a
# GHCR registry with a read:packages token in Portainer -> Registries).
#
# Note: `stampee-migrate` is a one-shot — it applies migrations and exits 0.
# Seeing it "exited" in Portainer is expected; it is not a crash.

# Shared env for the API + the one-shot migrator (the migrator imports the same
# config, so it needs the full set too).
x-stampee-api-env: &stampee-api-env
  NODE_ENV: production
  PORT: "3001"
  DATABASE_URL: postgres://${STAMPEE_DB_USER:-loyalty_user}:${STAMPEE_DB_PASSWORD}@${STAMPEE_DB_HOST:-postgres-transversal}:5432/${STAMPEE_DB_NAME:-stampee}
  PG_POOL_SIZE: "10"
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  JWT_ACCESS_TTL: 15m
  JWT_REFRESH_TTL: 30d
  COOKIE_SECURE: "true"
  COOKIE_DOMAIN: ""
  BCRYPT_COST: "12"
  PIN_BCRYPT_COST: "10"
  API_PUBLIC_URL: https://api.loyalty.goldenbeautystudio.com.co
  SPA_ORIGIN: https://loyalty.goldenbeautystudio.com.co
  APP_PUBLIC_URL: https://loyalty.goldenbeautystudio.com.co
  EMAIL_ADAPTER: console
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: "Stampee <no-reply@loyalty.goldenbeautystudio.com.co>"
  GCS_BUCKET: ${GCS_BUCKET:-}
  GCS_PROJECT_ID: ${GCS_PROJECT_ID:-}
  GOOGLE_APPLICATION_CREDENTIALS: ""
  GCS_PUBLIC_HOST: https://storage.googleapis.com
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_WORKSPACE_DOMAIN: ${GOOGLE_WORKSPACE_DOMAIN:-goldenbeautystudio.com.co}
  LOG_LEVEL: info

services:
  # One-shot: applies db/migrations/*.sql into the loyalty schema, then exits 0.
  stampee-migrate:
    container_name: stampee-migrate
    image: ghcr.io/mega61/stampee-api:latest
    restart: "no"
    command: ["node", "dist/scripts/migrate.js"]
    environment: *stampee-api-env
    networks:
      - data

  stampee-api:
    container_name: stampee-api
    image: ghcr.io/mega61/stampee-api:latest
    restart: unless-stopped
    depends_on:
      stampee-migrate:
        condition: service_completed_successfully
    environment: *stampee-api-env
    networks:
      - web
      - data

  # Admin + customer React UI (nginx static). The browser calls the API
  # directly, so this only needs the web network.
  stampee-spa:
    container_name: stampee-spa
    image: ghcr.io/mega61/stampee-spa:latest
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    external: true
  data:
    external: true
