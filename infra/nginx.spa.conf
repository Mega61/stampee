# Static server for the Stampee SPA. Caddy (the TLS edge) reverse-proxies to
# this container on port 80; this nginx just serves the built files with a
# client-side-routing fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed files under /assets — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path renders index.html so React Router can
    # handle routes like /<slug>/<uniqueId>.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
